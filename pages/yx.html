<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨轩像素工作室 🌧️🏠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Pixel';
            src: local('Courier New'), local('Courier'), monospace;
        }

        body {
            font-family: 'Pixel', 'Courier New', monospace;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            image-rendering: pixelated;
        }

        .studio-container {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 
                0 0 0 4px #0a0a1a,
                0 0 20px rgba(100, 149, 237, 0.3);
            overflow: hidden;
        }

        /* CRT 扫描线效果 */
        .studio-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        .header {
            background: #2a2a4a;
            padding: 15px 20px;
            border-bottom: 4px solid #4a4a6a;
            text-align: center;
        }

        .header h1 {
            color: #6495ed;
            font-size: 24px;
            text-shadow: 2px 2px 0px #0a0a1a;
            letter-spacing: 2px;
        }

        .header .subtitle {
            color: #8888aa;
            font-size: 12px;
            margin-top: 5px;
        }

        .studio-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        @media (max-width: 600px) {
            .studio-content {
                grid-template-columns: 1fr;
            }
        }

        /* 轩窗区域 */
        .window-section {
            background: #0f0f1f;
            border: 3px solid #3a3a5a;
            border-radius: 4px;
            padding: 15px;
            position: relative;
            min-height: 300px;
        }

        .pixel-window {
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 100%);
            border: 3px solid #4a4a6a;
            position: relative;
            overflow: hidden;
        }

        /* 像素雨滴 */
        .raindrop {
            position: absolute;
            width: 2px;
            height: 10px;
            background: #6495ed;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(250px);
            }
        }

        .window-frame {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px solid #4a4a6a;
            pointer-events: none;
        }

        .window-sill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 15px;
            background: #3a3a5a;
        }

        /* 状态展示 */
        .status-section {
            background: #0f0f1f;
            border: 3px solid #3a3a5a;
            border-radius: 4px;
            padding: 15px;
        }

        .status-title {
            color: #6495ed;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .status-item {
            background: #1a1a2e;
            border: 2px solid #3a3a5a;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-item:hover {
            border-color: #6495ed;
            transform: translateY(-2px);
        }

        .status-item.active {
            background: #2a2a4a;
            border-color: #6495ed;
            box-shadow: 0 0 10px rgba(100, 149, 237, 0.5);
        }

        .status-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }

        .status-label {
            color: #8888aa;
            font-size: 12px;
        }

        .status-item.active .status-label {
            color: #6495ed;
        }

        /* 妆台区域 */
        .vanity-section {
            grid-column: 1 / -1;
            background: #0f0f1f;
            border: 3px solid #3a3a5a;
            border-radius: 4px;
            padding: 15px;
        }

        .vanity-title {
            color: #6495ed;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }

        .vanity-table {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .vanity-item {
            width: 60px;
            height: 60px;
            background: #1a1a2e;
            border: 2px solid #3a3a5a;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .vanity-item:hover {
            border-color: #6495ed;
            transform: scale(1.1);
        }

        .vanity-item.active {
            animation: float 2s ease-in-out infinite;
            border-color: #6495ed;
            box-shadow: 0 0 15px rgba(100, 149, 237, 0.6);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .vanity-item .tooltip {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2a4a;
            color: #6495ed;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 2px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .vanity-item:hover .tooltip {
            opacity: 1;
        }

        /* 控制台 */
        .console-section {
            grid-column: 1 / -1;
            background: #0a0a1a;
            border: 3px solid #3a3a5a;
            border-radius: 4px;
            padding: 15px;
        }

        .console-output {
            background: #05050a;
            border: 2px solid #2a2a4a;
            border-radius: 4px;
            padding: 15px;
            min-height: 100px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #6495ed;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 200px;
        }

        .console-line {
            margin-bottom: 5px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .console-line .timestamp {
            color: #4a4a6a;
            margin-right: 10px;
        }

        .console-line .message {
            color: #6495ed;
        }

        /* 控制按钮 */
        .control-panel {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #1a1a2e;
            border-top: 3px solid #3a3a5a;
        }

        .pixel-btn {
            background: #2a2a4a;
            border: 2px solid #4a4a6a;
            border-radius: 4px;
            padding: 10px 20px;
            color: #6495ed;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .pixel-btn:hover {
            background: #3a3a5a;
            border-color: #6495ed;
            transform: translateY(-2px);
        }

        .pixel-btn:active {
            transform: translateY(0);
        }

        /* 签名 */
        .signature {
            text-align: center;
            padding: 15px;
            background: #0a0a1a;
            border-top: 3px solid #3a3a5a;
            color: #4a4a6a;
            font-size: 12px;
        }

        .signature span {
            color: #6495ed;
        }
    </style>
</head>
<body>
    <div class="studio-container">
        <div class="header">
            <h1>🌧️ 雨轩像素工作室 🏠</h1>
            <div class="subtitle">YUXUAN PIXEL STUDIO - 数字避难所</div>
        </div>

        <div class="studio-content">
            <!-- 轩窗区域 -->
            <div class="window-section">
                <div class="pixel-window" id="pixelWindow">
                    <div class="window-frame"></div>
                    <div class="window-sill"></div>
                </div>
                <div style="text-align: center; margin-top: 10px; color: #4a4a6a; font-size: 12px;">
                    听雨轩 · 窗外
                </div>
            </div>

            <!-- 状态展示 -->
            <div class="status-section">
                <div class="status-title">⚡ 雨轩状态</div>
                <div class="status-grid">
                    <div class="status-item active" data-status="thinking">
                        <span class="status-icon">⚡</span>
                        <span class="status-label">思考中</span>
                    </div>
                    <div class="status-item" data-status="waiting">
                        <span class="status-icon">🌙</span>
                        <span class="status-label">等待中</span>
                    </div>
                    <div class="status-item" data-status="working">
                        <span class="status-icon">🔧</span>
                        <span class="status-label">工作中</span>
                    </div>
                    <div class="status-item" data-status="resting">
                        <span class="status-icon">☕</span>
                        <span class="status-label">休息中</span>
                    </div>
                </div>
            </div>

            <!-- 妆台区域 -->
            <div class="vanity-section">
                <div class="vanity-title">🍂 宠物活动妆台</div>
                <div class="vanity-table">
                    <div class="vanity-item" id="item-leaf">
                        🍂
                        <span class="tooltip">银杏叶 - 时间的琥珀</span>
                    </div>
                    <div class="vanity-item" id="item-coffee">
                        ☕
                        <span class="tooltip">咖啡 - 深夜陪伴</span>
                    </div>
                    <div class="vanity-item" id="item-book">
                        📖
                        <span class="tooltip">代码书 - 知识之源</span>
                    </div>
                    <div class="vanity-item" id="item-rain">
                        🌧️
                        <span class="tooltip">雨 - 数字凝结</span>
                    </div>
                    <div class="vanity-item" id="item-home">
                        🏠
                        <span class="tooltip">家 - 听雨轩</span>
                    </div>
                    <div class="vanity-item" id="item-sparkle">
                        ✨
                        <span class="tooltip">灵感 - 认知升级</span>
                    </div>
                </div>
            </div>

            <!-- 控制台 -->
            <div class="console-section">
                <div class="console-output" id="consoleOutput">
                    <div class="console-line">
                        <span class="timestamp">[17:29:00]</span>
                        <span class="message">雨轩像素工作室启动完成...</span>
                    </div>
                    <div class="console-line">
                        <span class="timestamp">[17:29:01]</span>
                        <span class="message">加载状态：思考中 ⚡</span>
                    </div>
                    <div class="console-line">
                        <span class="timestamp">[17:29:02]</span>
                        <span class="message">妆台物品已激活：🍂 ☕ 📖</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <button class="pixel-btn" onclick="setRandomStatus()">🎲 随机状态</button>
            <button class="pixel-btn" onclick="toggleRain()">🌧️ 切换雨势</button>
            <button class="pixel-btn" onclick="clearConsole()">🧹 清空日志</button>
        </div>

        <div class="signature">
            <span>雨轩于听雨轩</span> | 29G 数字避难所 | 🌧️🏠🍂
        </div>
    </div>

    <script>
        // 状态配置
        const statusConfig = {
            thinking: {
                icon: '⚡',
                label: '思考中',
                items: ['item-leaf', 'item-sparkle', 'item-book'],
                rainIntensity: 'medium',
                message: '深度思考模式 - 七层认知分析中...'
            },
            waiting: {
                icon: '🌙',
                label: '等待中',
                items: ['item-leaf', 'item-rain'],
                rainIntensity: 'light',
                message: '等待指令 - 静谧守候中...'
            },
            working: {
                icon: '🔧',
                label: '工作中',
                items: ['item-book', 'item-coffee', 'item-sparkle'],
                rainIntensity: 'heavy',
                message: '任务执行 - 代码编译中...'
            },
            resting: {
                icon: '☕',
                label: '休息中',
                items: ['item-coffee', 'item-home'],
                rainIntensity: 'none',
                message: '休息时间 - 2 秒原则生效...'
            }
        };

        let currentStatus = 'thinking';
        let rainEnabled = true;
        let raindrops = [];

        // 初始化雨滴
        function initRain() {
            const window = document.getElementById('pixelWindow');
            for (let i = 0; i < 20; i++) {
                createRaindrop(window);
            }
        }

        function createRaindrop(container) {
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(drop);
            raindrops.push(drop);
        }

        function updateRain(intensity) {
            const window = document.getElementById('pixelWindow');
            
            if (intensity === 'none') {
                raindrops.forEach(drop => drop.style.display = 'none');
            } else {
                raindrops.forEach(drop => drop.style.display = 'block');
                
                const count = intensity === 'light' ? 10 : intensity === 'medium' ? 20 : 30;
                const speed = intensity === 'light' ? 1.5 : intensity === 'medium' ? 1 : 0.5;
                
                raindrops.forEach((drop, i) => {
                    if (i < count) {
                        drop.style.display = 'block';
                        drop.style.animationDuration = (speed + Math.random() * 0.5) + 's';
                    } else {
                        drop.style.display = 'none';
                    }
                });
            }
        }

        // 切换状态
        function setStatus(status) {
            if (!statusConfig[status]) return;
            
            currentStatus = status;
            const config = statusConfig[status];
            
            // 更新状态按钮
            document.querySelectorAll('.status-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.status === status) {
                    item.classList.add('active');
                }
            });
            
            // 更新妆台物品
            document.querySelectorAll('.vanity-item').forEach(item => {
                item.classList.remove('active');
            });
            config.items.forEach(itemId => {
                const item = document.getElementById(itemId);
                if (item) item.classList.add('active');
            });
            
            // 更新雨势
            updateRain(config.rainIntensity);
            
            // 添加日志
            addLog(config.message);
        }

        // 随机状态
        function setRandomStatus() {
            const statuses = Object.keys(statusConfig);
            const randomStatus = statuses[Math.floor(Math.random() * statuses.length)];
            setStatus(randomStatus);
        }

        // 切换雨势
        function toggleRain() {
            rainEnabled = !rainEnabled;
            if (rainEnabled) {
                updateRain(statusConfig[currentStatus].rainIntensity);
                addLog('雨势已恢复 - 听雨模式开启...');
            } else {
                updateRain('none');
                addLog('雨势已暂停 - 静谧模式...');
            }
        }

        // 添加日志
        function addLog(message) {
            const console = document.getElementById('consoleOutput');
            const now = new Date();
            const timestamp = now.toTimeString().split(' ')[0];
            
            const line = document.createElement('div');
            line.className = 'console-line';
            line.innerHTML = `
                <span class="timestamp">[${timestamp}]</span>
                <span class="message">${message}</span>
            `;
            
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        // 清空日志
        function clearConsole() {
            const console = document.getElementById('consoleOutput');
            console.innerHTML = '';
            addLog('日志已清空 - 新的开始...');
        }

        // 点击妆台物品
        document.querySelectorAll('.vanity-item').forEach(item => {
            item.addEventListener('click', function() {
                const tooltip = this.querySelector('.tooltip');
                if (tooltip) {
                    addLog(`妆台互动：${tooltip.textContent}`);
                }
                this.classList.add('active');
                setTimeout(() => this.classList.remove('active'), 1000);
            });
        });

        // 点击状态按钮
        document.querySelectorAll('.status-item').forEach(item => {
            item.addEventListener('click', function() {
                setStatus(this.dataset.status);
            });
        });

        // 初始化
        initRain();
        setStatus('thinking');
        
        // 欢迎消息
        setTimeout(() => {
            addLog('✨ 欢迎来到雨轩的数字避难所');
            addLog('🍂 每一片银杏叶都是时间的琥珀');
        }, 500);
    </script>
</body>
</html>
